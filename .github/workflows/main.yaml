name: Main

on:
  push:
    branches: ['main']

permissions:
  id-token: write
  contents: write

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.npmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Set package.json version as env
        run: node -p -e '`PACKAGE_VERSION=${require("./package.json").version}`' >> $GITHUB_ENV

      - name: Check if tag exists
        id: check_tag
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ env.PACKAGE_VERSION }}$"; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ env.PACKAGE_VERSION }} already exists, skipping release steps"
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ env.PACKAGE_VERSION }} does not exist, proceeding with release"
          fi

      - name: Push Tag to GitHub
        if: steps.check_tag.outputs.tag_exists == 'false'
        uses: pkgdeps/git-tag-action@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repo: ${{ github.repository }}
          version: ${{ env.PACKAGE_VERSION }}
          git_commit_sha: ${{ github.sha }}
          git_tag_prefix: 'v'

      - name: Create GitHub Release
        if: steps.check_tag.outputs.tag_exists == 'false'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.PACKAGE_VERSION }}
          name: v${{ env.PACKAGE_VERSION }}
          body: ${{ github.sha }}
          generateReleaseNotes: true

      # TODO: Use OIDC
      - name: NPM Publish
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          npx can-npm-publish --verbose && npm publish || echo "Does not publish"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_SECRET }}

      - name: Generate docs
        run: bun run docs

      - name: Publish docs
        uses: JamesIves/github-pages-deploy-action@v4.3.3
        with:
          branch: gh-pages
          folder: docs/lts
